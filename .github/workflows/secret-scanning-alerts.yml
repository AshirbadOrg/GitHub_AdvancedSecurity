name: "Secret Scanning — Alert on Detection"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  security-events: read
  pull-requests: write
  issues: write

jobs:
  secret-scan-alerts:
    name: "Secret Scanning Alert Gate"
    runs-on: ubuntu-latest

    steps:
      - name: Evaluate secret scanning alerts
        id: alerts
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const alerts = await github.paginate('GET /repos/{owner}/{repo}/secret-scanning/alerts', {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            core.setOutput('open_count', String(alerts.length));

            if (context.eventName === 'pull_request') {
              const body = alerts.length
                ? [
                    '## 🔐 Secret Scanning Alerts',
                    '',
                    `Open alerts detected: **${alerts.length}**`,
                    '',
                    'This gate is blocking until all open secrets are resolved.',
                    'Review Security → Secret scanning and map intentional entries to `SECURITY-EVAL.md`.'
                  ].join('\n')
                : '## 🔐 Secret Scanning Alerts\n\n✅ No open secret scanning alerts.';

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }

            if (alerts.length > 0) {
              core.setFailed(`Open secret scanning alerts detected: ${alerts.length}`);
            }

      - name: Post summary
        if: always()
        run: |
          echo "## 🔐 Secret Scanning Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Open alerts: ${{ steps.alerts.outputs.open_count }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Gate: blocks when open alerts exist" >> "$GITHUB_STEP_SUMMARY"
          echo "- Mapping: SECURITY-EVAL.md" >> "$GITHUB_STEP_SUMMARY"
