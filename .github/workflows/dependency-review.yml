name: "Dependency Review — SCA Gate"

on:
  pull_request:
    branches: [main, develop]
    paths:
      - '**/package.json'
      - '**/package-lock.json'

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  dependency-review:
    name: "Dependency Review"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          allow-ghsas: GHSA-cph5-m8f7-6c5x,GHSA-8cf7-32gw-wr33
          comment-summary-in-pr: always
          deny-licenses: GPL-2.0,GPL-3.0,AGPL-3.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: npm audit — API
        run: npm audit --json --audit-level=moderate --workspace=packages/api > audit-api.json 2>&1 || true

      - name: npm audit — Client
        run: npm audit --json --audit-level=moderate --workspace=packages/client > audit-client.json 2>&1 || true

      - name: Post audit summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            function parseAudit(file, label) {
              try {
                const data = JSON.parse(fs.readFileSync(file, 'utf8'));
                const vulns = data.vulnerabilities || {};
                const rows = Object.entries(vulns).map(([pkg, info]) =>
                  `| \`${pkg}\` | ${info.severity} | ${(info.via || []).map(v => typeof v === 'string' ? v : v.title).join(', ') || '—'} |`
                ).join('\n');
                const total = Object.keys(vulns).length;
                return total
                  ? `### ${label} — ${total} vulnerable package(s)\n\n| Package | Severity | Advisory |\n|---------|----------|----------|\n${rows}`
                  : `### ${label} — ✅ No vulnerabilities found`;
              } catch {
                return `### ${label} — ⚠️ Could not parse audit output`;
              }
            }

            const body = [
              '## 📦 npm Audit Results',
              '',
              parseAudit('audit-api.json', '`packages/api`'),
              '',
              parseAudit('audit-client.json', '`packages/client`'),
              '',
              '> Intentional vulnerabilities are documented in `SECURITY-EVAL.md`.'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

      - name: Post dependency review summary
        if: always()
        run: |
          echo "## 📦 Dependency Review Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Threshold |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-----------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Block on severity | **high** and above |" >> "$GITHUB_STEP_SUMMARY"
          echo "| License check | GPL-2/3, AGPL-3 denied |" >> "$GITHUB_STEP_SUMMARY"
          echo "| npm audit | moderate+ reported |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Mapping | SECURITY-EVAL.md |" >> "$GITHUB_STEP_SUMMARY"
